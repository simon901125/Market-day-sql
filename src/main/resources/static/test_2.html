<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>Logged In Test Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 32px;
      }

      button {
        margin-top: 16px;
        padding: 8px 12px;
      }

      table {
        margin-top: 16px;
        border-collapse: collapse;
        min-width: 360px;
      }

      th,
      td {
        border: 1px solid #d1d5db;
        padding: 8px 10px;
        text-align: left;
      }

      th {
        background: #f3f4f6;
      }

      pre {
        margin-top: 20px;
        padding: 12px;
        background: #111827;
        color: #e5e7eb;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Logged In Page</h1>
    <p>Current user: <strong id="userName">Loading...</strong></p>
    <table>
      <tbody>
        <tr>
          <th>ID</th>
          <td id="userId">Loading...</td>
        </tr>
        <tr>
          <th>Role</th>
          <td id="userRole">Loading...</td>
        </tr>
        <tr>
          <th>Name</th>
          <td id="userNameDetail">Loading...</td>
        </tr>
        <tr>
          <th>Email</th>
          <td id="userEmail">Loading...</td>
        </tr>
        <tr>
          <th>Phone</th>
          <td id="userPhone">Loading...</td>
        </tr>
        <tr>
          <th>Provider</th>
          <td id="userProvider">Loading...</td>
        </tr>
        <tr>
          <th>Status</th>
          <td id="userStatus">Loading...</td>
        </tr>
      </tbody>
    </table>
    <button type="button" id="logoutBtn">Logout</button>
    <pre id="result">Checking token...</pre>

    <script>
      const API_BASE_URL = "http://localhost:8080";
      const userName = document.getElementById("userName");
      const userId = document.getElementById("userId");
      const userRole = document.getElementById("userRole");
      const userNameDetail = document.getElementById("userNameDetail");
      const userEmail = document.getElementById("userEmail");
      const userPhone = document.getElementById("userPhone");
      const userProvider = document.getElementById("userProvider");
      const userStatus = document.getElementById("userStatus");
      const result = document.getElementById("result");
      const logoutBtn = document.getElementById("logoutBtn");

      function show(title, body) {
        result.textContent = title + "\n\n" + body;
      }

      function requireToken() {
        const token = localStorage.getItem("jwtToken");
        if (!token) {
          window.location.href = "test.html";
          return "";
        }
        return token;
      }

      function renderUser(user) {
        userName.textContent = user.name || user.email || "Unknown user";
        userId.textContent = user.id ?? "";
        userRole.textContent = user.role ?? "";
        userNameDetail.textContent = user.name ?? "";
        userEmail.textContent = user.email ?? "";
        userPhone.textContent = user.phone ?? "";
        userProvider.textContent = user.provider ?? "";
        userStatus.textContent = user.status ?? "";
      }

      async function loadCurrentUser() {
        const token = requireToken();
        if (!token) {
          return;
        }

        show("Loading current user", "GET /api/auth/me");

        try {
          const response = await fetch(API_BASE_URL + "/api/auth/me", {
            method: "GET",
            headers: {
              "Authorization": "Bearer " + token,
            },
          });

          const text = await response.text();
          show("HTTP " + response.status, text);

          const data = JSON.parse(text);
          if (data.user) {
            renderUser(data.user);
            localStorage.setItem("loginUser", JSON.stringify(data.user));
          }
        } catch (error) {
          show("Load current user failed", String(error));
        }
      }

      async function logout() {
        const token = requireToken();
        if (!token) {
          return;
        }

        show("Sending logout request", "POST /api/auth/logout");

        try {
          const response = await fetch(API_BASE_URL + "/api/auth/logout", {
            method: "POST",
            headers: {
              "Authorization": "Bearer " + token,
            },
          });

          const text = await response.text();
          show("HTTP " + response.status, text);

          localStorage.removeItem("jwtToken");
          localStorage.removeItem("loginUser");
          window.location.href = "test.html";
        } catch (error) {
          show("Logout failed", String(error));
        }
      }

      logoutBtn.addEventListener("click", logout);
      loadCurrentUser();
    </script>
  </body>
</html>
