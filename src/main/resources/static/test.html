<!doctype html>
<!-- Local test URL: http://localhost:8081/test.html -->
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>Google Credential Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 32px;
      }

      button {
        margin: 12px 0;
        padding: 8px 12px;
      }

      pre {
        margin-top: 16px;
        max-width: 100%;
        padding: 12px;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
        background: #111827;
        color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <h1>Google Credential Test</h1>

    <p>Sign in with Google to get a credential for Swagger testing.</p>
    <div id="googleButton"></div>

    <button type="button" id="copyBtn" disabled>Copy credential</button>
    <pre id="credentialOutput">Waiting for Google sign in...</pre>

    <script>
      const GOOGLE_CLIENT_ID =
        "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";

      const copyBtn = document.getElementById("copyBtn");
      const credentialOutput = document.getElementById("credentialOutput");
      let googleCredential = "";

      window.onload = function () {
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleGoogleCredential,
        });

        google.accounts.id.renderButton(
          document.getElementById("googleButton"),
          {
            theme: "outline",
            size: "large",
            text: "signin_with",
          },
        );
      };

      function handleGoogleCredential(response) {
        googleCredential = response.credential;
        credentialOutput.textContent = googleCredential;
        copyBtn.disabled = false;
      }

      copyBtn.addEventListener("click", async function () {
        if (!googleCredential) {
          return;
        }

        await navigator.clipboard.writeText(googleCredential);
        copyBtn.textContent = "Copied";
      });
    </script>
  </body>
</html>
