# for spring boot to sql server
spring.application.name=demo
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=MarketDayDB;encrypt=true;trustServerCertificate=true}
# 可設定環境變數 DB_USERNAME，或修改冒號後的本機預設帳號。
spring.datasource.username=${DB_USERNAME:sa}
# 可設定環境變數 DB_PASSWORD，或修改冒號後的 SQL Server 密碼。
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# for google oauth
google.client-id=${GOOGLE_CLIENT_ID:}
# for jwt
jwt.secret=${JWT_SECRET:please-change-this-local-dev-secret-to-a-long-random-value}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# for email verification
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.port=${SERVER_PORT:8081}

# for swagger ui
springdoc.swagger-ui.path=/swagger-ui/marketDay/index.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
